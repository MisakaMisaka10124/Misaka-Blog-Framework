name: Sync to Gitee

on:
  push:
    branches: [main]
    tags: ['v*']
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: '要同步的 Release tag（如 v1.3.1），留空则仅同步代码'
        required: false

jobs:
  # 同步代码到 Gitee
  sync-code:
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to Gitee
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
        run: |
          git remote add gitee "https://MisakaMisaka10124:${GITEE_TOKEN}@gitee.com/MisakaMisaka10124/Misaka-Blog-Framework.git"
          git push gitee --all --force
          git push gitee --tags --force
          echo "[SUCCESS] 代码同步完成"

  # 同步 Release 到 Gitee
  sync-release:
    runs-on: ubuntu-latest
    if: github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && github.event.inputs.tag != '')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.event.release.tag_name || github.event.inputs.tag }}
        run: |
          mkdir -p release-assets
          # 等待 Build and Release 上传资产完成（最多等 5 分钟）
          for i in $(seq 1 30); do
            if gh release download "${TAG}" -D release-assets/ --repo "${{ github.repository }}" 2>/dev/null; then
              echo "[INFO] 资产下载成功"
              break
            fi
            echo "[INFO] 等待资产上传完成... (${i}/30)"
            sleep 10
          done
          # 最终检查
          if [ -z "$(ls -A release-assets/ 2>/dev/null)" ]; then
            echo "[ERROR] 等待超时，Release 无资产"
            exit 1
          fi

      - name: Sync release to Gitee
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
          TAG: ${{ github.event.release.tag_name || github.event.inputs.tag }}
        run: |
          OWNER="MisakaMisaka10124"
          REPO="Misaka-Blog-Framework"
          API="https://gitee.com/api/v5/repos/${OWNER}/${REPO}"

          echo "[INFO] 同步 ${TAG} 到 Gitee..."

          # 创建 tag（如果不存在）
          echo "[INFO] 检查/创建 tag ${TAG}..."
          TAG_RESPONSE=$(curl -s -X POST "${API}/tags" \
            -d "access_token=${GITEE_TOKEN}" \
            -d "tag_name=${TAG}" \
            -d "refs=main" \
            -d "message=${TAG}")
          echo "[INFO] Tag 响应: ${TAG_RESPONSE}"

          # 创建发行版
          echo "[INFO] 创建发行版..."
          RELEASE_RESPONSE=$(curl -s -X POST "${API}/releases" \
            -d "access_token=${GITEE_TOKEN}" \
            -d "tag_name=${TAG}" \
            -d "name=${TAG}" \
            -d "target_commitish=main" \
            -d "body=Synced from GitHub release ${TAG}")
          echo "[INFO] 发行版响应: ${RELEASE_RESPONSE}"

          RELEASE_ID=$(echo "$RELEASE_RESPONSE" | grep -o '"id":[0-9]*' | head -1 | grep -o '[0-9]*')

          if [ -z "$RELEASE_ID" ]; then
            echo "[WARN] 创建失败，尝试获取已有发行版..."
            RELEASE_ID=$(curl -s "${API}/releases?access_token=${GITEE_TOKEN}" | \
              grep -o "\"id\":[0-9]*,\"tag_name\":\"${TAG}\"" | grep -o '[0-9]*' | head -1)
            echo "[INFO] 已有发行版 ID: ${RELEASE_ID}"
          fi

          # 上传附件
          if [ -z "$RELEASE_ID" ]; then
            echo "[ERROR] 无法获取发行版 ID"
            exit 1
          fi

          for file in release-assets/*; do
            filename=$(basename "$file")
            echo "[INFO] 上传 ${filename}..."
            UPLOAD_RESPONSE=$(curl -s -X POST "${API}/releases/${RELEASE_ID}/attach_files" \
              -H "Content-Type: multipart/form-data" \
              -F "access_token=${GITEE_TOKEN}" \
              -F "file=@${file}")
            echo "[INFO] 上传响应: ${UPLOAD_RESPONSE}"
          done

          echo "[SUCCESS] Release 同步完成"
