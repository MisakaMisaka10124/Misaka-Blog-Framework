name: Sync Release to Gitee

on:
  release:
    types: [published]

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p release-assets
          gh release download "${{ github.event.release.tag_name }}" \
            -D release-assets/ \
            --repo "${{ github.repository }}"

      - name: Sync to Gitee
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
          TAG: ${{ github.event.release.tag_name }}
        run: |
          OWNER="MisakaMisaka10124"
          REPO="Misaka-Blog-Framework"
          API="https://gitee.com/api/v5/repos/${OWNER}/${REPO}"

          echo "[INFO] 同步 ${TAG} 到 Gitee..."

          # 1. 创建 tag（如果不存在）
          echo "[INFO] 创建 tag..."
          curl -s -X POST "${API}/tags" \
            -d "access_token=${GITEE_TOKEN}" \
            -d "tag=${TAG}" \
            -d "message=${TAG}" \
            -d "target=main" || true

          # 2. 创建发行版
          echo "[INFO] 创建发行版..."
          RELEASE_RESPONSE=$(curl -s -X POST "${API}/releases" \
            -d "access_token=${GITEE_TOKEN}" \
            -d "tag_name=${TAG}" \
            -d "name=${TAG}" \
            -d "body=Synced from GitHub release ${TAG}")

          # 获取发行版 ID
          RELEASE_ID=$(echo "$RELEASE_RESPONSE" | grep -o '"id":[0-9]*' | head -1 | grep -o '[0-9]*')
          echo "[INFO] Gitee Release ID: ${RELEASE_ID}"

          if [ -z "$RELEASE_ID" ]; then
            echo "[WARN] 创建发行版失败，可能已存在，尝试获取已有发行版..."
            RELEASE_ID=$(curl -s "${API}/releases?access_token=${GITEE_TOKEN}" | \
              grep -o "\"id\":[0-9]*,\"tag_name\":\"${TAG}\"" | grep -o '[0-9]*' | head -1)
            echo "[INFO] 已有 Release ID: ${RELEASE_ID}"
          fi

          # 3. 上传附件
          if [ -n "$RELEASE_ID" ]; then
            for file in release-assets/*; do
              filename=$(basename "$file")
              echo "[INFO] 上传 ${filename}..."
              curl -s -X POST "${API}/releases/${RELEASE_ID}/attach_files" \
                -H "Content-Type: multipart/form-data" \
                -F "access_token=${GITEE_TOKEN}" \
                -F "file=@${file}" | grep -o '"browser_download_url":"[^"]*"' || echo "[WARN] ${filename} 上传可能失败"
            done
          else
            echo "[ERROR] 无法获取发行版 ID，跳过附件上传"
            exit 1
          fi

          echo "[SUCCESS] 同步完成！"
